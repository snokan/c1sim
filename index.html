<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>順位戦 C級1組 最終局シミュレーター</title>
    <style>
        body { font-family: sans-serif; background-color: #f9f7f2; margin: 10px; line-height: 1.4; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-left: 5px solid #8b4513; padding-left: 10px; color: #5d2e0a; font-size: 1.25em; }
        
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; table-layout: fixed; min-width: 400px; }
        th, td { border: 1px solid #ddd; padding: 8px 2px; text-align: center; font-size: 0.85em; }
        th { background-color: #f2ede4; }
        
        th:nth-child(1) { width: 12%; }
        th:nth-child(2) { width: 24%; }
        th:nth-child(3) { width: 22%; }
        th:nth-child(4) { width: 12%; }
        th:nth-child(5) { width: 18%; }
        th:nth-child(6) { width: 12%; }

        .promotion-zone { background-color: #e3f2fd; font-weight: bold; }
        
        .btn-update { display: block; width: 100%; max-width: 300px; margin: 20px auto; padding: 15px; background-color: #2c3e50; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; }
        .btn-update:hover { background-color: #34495e; }

        .win-select { width: 100%; max-width: 80px; font-size: 1.4em; font-weight: bold; padding: 5px; cursor: pointer; text-align: left; }
        .td-select { text-align: center; }

        #patternArea { margin-top: 30px; }
        .player-cond-section { margin-bottom: 25px; padding: 15px; background: #fff; border-radius: 8px; border: 1px solid #ddd; border-left: 8px solid #2c3e50; }
        .no-chance { border-left: 8px solid #ccc; color: #666; background-color: #fcfcfc; }
        .no-chance h3 { color: #666; }
        
        .player-cond-section h3 { margin-top: 0; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 5px; font-size: 1.1em; }
        .pattern-list { padding-left: 20px; list-style-type: decimal; font-size: 0.9em; }
        .cond-item { display: inline-block; background: #e8eaf6; padding: 2px 8px; border-radius: 4px; margin: 2px; border: 1px solid #c5cae9; font-weight: bold; font-size: 0.9em; white-space: nowrap; }
        #summary { text-align: center; font-weight: bold; color: #1565c0; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>順位戦 C級1組 最終局シミュレーター</h2>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>順位</th><th>棋士名 (前)</th><th>相手</th><th>成績</th><th>最終局</th><th>最終成績</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <button class="btn-update" onclick="updateAll()">現在の状況で全員の条件を解析</button>
    <div id="summary"></div>
    <div id="patternArea"></div>
</div>

<script>
let players = [
    { id: 1, name: "都成竜馬", prevRank: 10, win: 8, lose: 1, opponent: "杉本昌隆" },
    { id: 2, name: "西田拓也", prevRank: 13, win: 8, lose: 1, opponent: "三枚堂達也" },
    { id: 3, name: "岡部怜央", prevRank: 29, win: 8, lose: 1, opponent: "中川大輔" },
    { id: 4, name: "杉本昌隆", prevRank: 1, win: 7, lose: 2, opponent: "都成竜馬" },
    { id: 5, name: "三枚堂達也", prevRank: 12, win: 7, lose: 2, opponent: "西田拓也" },
    { id: 6, name: "高田明浩", prevRank: 19, win: 7, lose: 2, opponent: "先崎学" },
    { id: 7, name: "飯塚祐紀", prevRank: 23, win: 7, lose: 2, opponent: "出口若武" }
];

const matchPairs = {
    "都成竜馬": "杉本昌隆", "杉本昌隆": "都成竜馬",
    "西田拓也": "三枚堂達也", "三枚堂達也": "西田拓也"
};

function onResultChange(playerName, value) {
    const opponentName = matchPairs[playerName];
    if (opponentName) {
        const opponent = players.find(p => p.name === opponentName);
        const el = document.getElementById(`result-${opponent.id}`);
        if (el) {
            if (value === "win") el.value = "lose";
            else if (value === "lose") el.value = "win";
            else el.value = "";
        }
    }
}

function calculateCurrentData() {
    return players.map(p => {
        const result = document.getElementById(`result-${p.id}`)?.value || "";
        return { 
            ...p, 
            finalWin: p.win + (result === "win" ? 1 : 0), 
            finalLose: p.lose + (result === "lose" ? 1 : 0),
            isWinNow: result === "" ? null : (result === "win"), 
            isTemp: result || null 
        };
    });
}

function sortRanking(data) {
    return [...data].sort((a, b) => (b.finalWin - a.finalWin) || (a.prevRank - b.prevRank));
}

function applyRules(data) {
    Object.keys(matchPairs).forEach(name => {
        let p = data.find(x => x.name === name), o = data.find(x => x.name === matchPairs[name]);
        if (p.isTemp === "win") { o.isTemp = "lose"; o.finalWin = o.win; o.finalLose = o.lose + 1; }
        else if (p.isTemp === "lose") { o.isTemp = "win"; o.finalWin = o.win + 1; o.finalLose = o.lose; }
    });
}

function updateTable(data) {
    const sorted = sortRanking(data), tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    sorted.forEach((p, i) => {
        const tr = document.createElement('tr');
        if (i < 3) tr.className = 'promotion-zone';
        tr.innerHTML = `<td>${i+1}位</td><td>${p.name}(${p.prevRank})</td><td>${p.opponent}</td><td>${p.win}-${p.lose}</td>
            <td class="td-select"><select class="win-select" id="result-${p.id}" onchange="onResultChange('${p.name}', this.value)">
                <option value="">-</option><option value="win" ${p.isWinNow===true?'selected':''}>○</option>
                <option value="lose" ${p.isWinNow===false?'selected':''}>●</option></select></td>
            <td>${p.finalWin}-${p.finalLose}</td>`;
        tbody.appendChild(tr);
    });
    document.getElementById('summary').innerText = `【現在の上位】 ${sorted.slice(0, 3).map(p => p.name).join('、')}`;
}

function getPromotionPatterns(target, baseData) {
    const undecided = baseData.filter(p => p.isWinNow === null);
    const independentPlayers = [];
    const seenPair = new Set();
    undecided.forEach(p => {
        const opp = matchPairs[p.name];
        if (!seenPair.has(p.name)) {
            independentPlayers.push(p);
            seenPair.add(p.name);
            if (opp) seenPair.add(opp);
        }
    });

    const indNames = independentPlayers.map(p => p.name);
    let successData = [];
    for (let i = 0; i < (1 << independentPlayers.length); i++) {
        let temp = JSON.parse(JSON.stringify(baseData));
        independentPlayers.forEach((p, idx) => {
            let isWin = (i >> idx) & 1;
            let targetP = temp.find(x => x.id === p.id);
            targetP.isTemp = isWin ? "win" : "lose";
            targetP.finalWin = targetP.win + (isWin ? 1 : 0);
            targetP.finalLose = targetP.lose + (isWin ? 0 : 1);
        });
        applyRules(temp);
        if (sortRanking(temp).slice(0, 3).some(x => x.name === target)) {
            successData.push(independentPlayers.reduce((acc, p, idx) => {
                acc[p.name] = (i >> idx) & 1 ? "○" : "●";
                return acc;
            }, {}));
        }
    }

    if (successData.length === 0) return null;

    function getPrimes(data, keys) {
        let current = [...data];
        for (let k = 0; k < keys.length; k++) {
            let next = [], used = new Set();
            for (let i = 0; i < current.length; i++) {
                for (let j = i + 1; j < current.length; j++) {
                    let diffKey = null, match = true;
                    for (let key of keys) {
                        if (current[i][key] !== current[j][key]) {
                            if (diffKey === null) diffKey = key;
                            else { match = false; break; }
                        }
                    }
                    if (match && diffKey) {
                        let combined = { ...current[i], [diffKey]: "－" };
                        next.push(JSON.stringify(combined));
                        used.add(JSON.stringify(current[i])); used.add(JSON.stringify(current[j]));
                    }
                }
            }
            if (next.length === 0) break;
            let combinedResults = Array.from(new Set(next)).map(s => JSON.parse(s));
            current.forEach(p => { if (!used.has(JSON.stringify(p))) combinedResults.push(p); });
            current = combinedResults;
        }
        return current;
    }

    let primes = getPrimes(successData, indNames);
    primes.sort((a, b) => Object.values(b).filter(v => v === "－").length - Object.values(a).filter(v => v === "－").length);
    let finalPrimes = [];
    primes.forEach(p => {
        if (!finalPrimes.some(f => indNames.every(k => f[k] === "－" || f[k] === p[k]))) {
            finalPrimes.push(p);
        }
    });

    return finalPrimes.map(p => {
        let displayItems = [];
        indNames.forEach(name => {
            if (p[name] !== "－") {
                displayItems.push(`<span class="cond-item">${name}:${p[name]}</span>`);
                const opp = matchPairs[name];
                if (opp) displayItems.push(`<span class="cond-item">${opp}:${p[name]==="○"?"●":"○"}</span>`);
            }
        });
        return displayItems.join(" ") || "確定";
    });
}

function updateAll() {
    const data = calculateCurrentData();
    updateTable(data);
    
    const area = document.getElementById("patternArea");
    area.innerHTML = "<h3>【全員の昇級条件解析】</h3>";

    // 取得した data（最新の最終成績が含まれる）を使って表示を構築
    data.forEach(player => {
        const patterns = getPromotionPatterns(player.name, data);
        const section = document.createElement("div");
        
        // player.finalWin と player.finalLose を使うことで、シミュレーション結果を反映
        const scoreText = `${player.finalWin}勝${player.finalLose}敗`;

        if (patterns) {
            section.className = "player-cond-section";
            let html = `<h3>${player.name} (${scoreText})</h3><ul class="pattern-list">`;
            patterns.forEach(pt => { html += `<li>${pt}</li>`; });
            html += `</ul>`;
            section.innerHTML = html;
        } else {
            section.className = "player-cond-section no-chance";
            section.innerHTML = `<h3>${player.name} (${scoreText})</h3><p style="margin: 5px 0 0 20px; font-size: 0.9em; font-weight: bold;">昇級の可能性なし</p>`;
        }
        area.appendChild(section);
    });
}

updateAll();
</script>
</body>
</html>
